name: CI Pipeline

on:
  push:
    branches: [ master, main, develop ]
  pull_request:
    branches: [ master, main ]

permissions:
  contents: write

jobs:
  tests:
    name: Tests on Ubuntu with JDK 23
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: company_rep
          POSTGRES_USER: company_rep_adm
          POSTGRES_PASSWORD: comprep
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U company_rep_adm -d company_rep"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 23
        uses: actions/setup-java@v4
        with:
          distribution: oracle
          java-version: '23'
          cache: gradle

      - name: Grant execute permission for Gradle
        run: chmod +x ./gradlew

      - name: Run tests and generate Jacoco report
        run: ./gradlew test jacocoTestReport
        env:
          SPRING_JPA_HIBERNATE_DDL_AUTO: update

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            build/reports/tests/test/
            build/reports/jacoco/test/html/
            build/test-results/test/
            build/reports/problems/

      - name: Deploy Jacoco report to GitHub Pages
        if: success() && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/reports/jacoco/test/html
          publish_branch: gh-pages

  notify:
    name: Telegram notification
    runs-on: ubuntu-latest
    needs: [tests]
    if: always()

    steps:
      - name: Send Telegram notification
        run: |
          if [ "${{ needs.tests.result }}" = "success" ]; then
            STATUS="Все тесты прошли."
          else
            STATUS="Процесс завершён с ошибками."
          fi

          curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage \
            -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
            -d text="$STATUS%0ARepository: ${{ github.repository }}%0ABranch: ${{ github.ref_name }}%0ARun: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"