name: CI Pipeline

on:
  push:
    branches: [ master, main, develop ]
  pull_request:
    branches: [ master, main ]

jobs:
  tests:
    name: Tests on ${{ matrix.os }} with JDK ${{ matrix.java }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        java: [21, 23]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          cache: gradle

      - name: Grant execute permission for Gradle
        if: runner.os != 'Windows'
        run: chmod +x ./gradlew

      - name: Run tests on Unix
        if: runner.os != 'Windows'
        run: ./gradlew test

      - name: Run tests on Windows
        if: runner.os == 'Windows'
        run: .\gradlew.bat test

      - name: Generate Jacoco report on Unix
        if: always() && runner.os != 'Windows'
        run: ./gradlew jacocoTestReport

      - name: Generate Jacoco report on Windows
        if: always() && runner.os == 'Windows'
        run: .\gradlew.bat jacocoTestReport

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-${{ matrix.os }}-jdk-${{ matrix.java }}
          path: |
            build/reports/tests/test/
            build/reports/jacoco/test/html/
            build/test-results/test/